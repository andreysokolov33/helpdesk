services:
  app:
    build: .
    image: ${HELPDESK_IMAGE:-helpdesk:latest}
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - helpdesk_logs:/app/logs
      # Медиа чата на диске проекта (nginx alias → ./uploads)
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  helpdesk_logs:
